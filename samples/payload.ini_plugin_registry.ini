[plugin]
name = "telemetry"
enabled = true
channel = "stable"
owner = "platform"
notes = "keep this plugin enabled for desktop sync, verify rollout health before every release, and watch for telemetry backpressure during the first 24 hours"

[plugin]
name = "theme"
enabled = false
channel = "beta"
owner = "design"
notes = "leave disabled until accessibility review, brand signoff, and asset QA are complete"

[plugin]
name = "sync"
enabled = true
channel = "stable"
owner = "platform"
notes = "keep the sync worker enabled for the internal desktop fleet and monitor conflict handling, retry behavior, and offline recovery"

[plugin]
name = "search"
enabled = true
channel = "stable"
owner = "productivity"
notes = "keep the desktop search indexer enabled, confirm background indexing stays under the CPU budget, and check that local cache hydration remains fast"

[plugin]
name = "capture"
enabled = false
channel = "preview"
owner = "workflow"
notes = "hold this plugin back until capture permission flows, metadata export, and PDF rendering are approved"

[plugin]
name = "calendar"
enabled = true
channel = "stable"
owner = "productivity"
notes = "keep the calendar plugin enabled and verify that external account sync, reminders, and timezone conversions remain correct"

[plugin]
name = "snippets"
enabled = true
channel = "beta"
owner = "developer-tools"
notes = "keep snippet sync on the beta channel while the editor integration, conflict resolution, and cloud storage retention policy are finalized"

[plugin]
name = "tasks"
enabled = true
channel = "stable"
owner = "workflow"
notes = "keep task sync enabled and watch mobile pairing, repeated notifications, and overdue badge calculations"

[plugin]
name = "notes"
enabled = true
channel = "stable"
owner = "productivity"
notes = "keep note sync enabled, confirm markdown export remains intact, and make sure large attachment uploads do not block the UI"

[plugin]
name = "backup"
enabled = false
channel = "preview"
owner = "platform"
notes = "leave backup disabled until restore testing, encryption settings, and retention policy review are complete"

[plugin]
name = "sharing"
enabled = true
channel = "beta"
owner = "collaboration"
notes = "keep sharing enabled for the beta cohort and review link permissions, invite flow, and notification delivery"

[plugin]
name = "analytics"
enabled = true
channel = "stable"
owner = "platform"
notes = "keep analytics enabled for desktop usage reporting, verify batching, and make sure the upload queue drains before shutdown"
