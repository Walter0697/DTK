[plugin]
name = "telemetry"
enabled = true
channel = "stable"
owner = "platform"
notes = "keep this plugin enabled for desktop sync, verify rollout health before every release, watch for telemetry backpressure during the first 24 hours, confirm event batching stays within budget, and repeat the rollout checklist for each staged ring"

[plugin]
name = "theme"
enabled = false
channel = "beta"
owner = "design"
notes = "leave disabled until accessibility review, brand signoff, asset QA, and palette contrast validation are complete; re-check the reviewer list after every design pass"

[plugin]
name = "sync"
enabled = true
channel = "stable"
owner = "platform"
notes = "keep the sync worker enabled for the internal desktop fleet and monitor conflict handling, retry behavior, offline recovery, queue pressure, and background wakeups across repeated test runs"

[plugin]
name = "search"
enabled = true
channel = "stable"
owner = "productivity"
notes = "keep the desktop search indexer enabled, confirm background indexing stays under the CPU budget, check that local cache hydration remains fast, and repeat the profiling sweep after every asset refresh"

[plugin]
name = "capture"
enabled = false
channel = "preview"
owner = "workflow"
notes = "hold this plugin back until capture permission flows, metadata export, PDF rendering, and document handoff audits are approved"

[plugin]
name = "calendar"
enabled = true
channel = "stable"
owner = "productivity"
notes = "keep the calendar plugin enabled and verify that external account sync, reminders, timezone conversions, and recurring event edits remain correct across every client"

[plugin]
name = "snippets"
enabled = true
channel = "beta"
owner = "developer-tools"
notes = "keep snippet sync on the beta channel while the editor integration, conflict resolution, cloud storage retention policy, and upload retry rules are finalized"

[plugin]
name = "tasks"
enabled = true
channel = "stable"
owner = "workflow"
notes = "keep task sync enabled and watch mobile pairing, repeated notifications, overdue badge calculations, and multi-device merge behavior"

[plugin]
name = "notes"
enabled = true
channel = "stable"
owner = "productivity"
notes = "keep note sync enabled, confirm markdown export remains intact, make sure large attachment uploads do not block the UI, and re-run the export matrix after every parser update"

[plugin]
name = "backup"
enabled = false
channel = "preview"
owner = "platform"
notes = "leave backup disabled until restore testing, encryption settings, retention policy review, and recovery drill signoff are complete"

[plugin]
name = "sharing"
enabled = true
channel = "beta"
owner = "collaboration"
notes = "keep sharing enabled for the beta cohort and review link permissions, invite flow, notification delivery, and guest access expiration behavior"

[plugin]
name = "analytics"
enabled = true
channel = "stable"
owner = "platform"
notes = "keep analytics enabled for desktop usage reporting, verify batching, make sure the upload queue drains before shutdown, and compare repeated sampling windows across releases"
