name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Install script smoke test
        run: |
          export DTK_INSTALL_DIR="$RUNNER_TEMP/dtk-bin"
          ./install.sh
          "$DTK_INSTALL_DIR/dtk" version
