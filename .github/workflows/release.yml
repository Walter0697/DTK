name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --bins --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="dist/dtk-${{ matrix.target }}"
          mkdir -p "$dist_dir"
          for bin in dtk dtk_detect_json dtk_inspect_json dtk_filter_json dtk_recover_json dtk_retrieve_json dtk_cleanup_store dtk_exec dtk_hook_route; do
            cp "target/${{ matrix.target }}/release/${bin}" "$dist_dir/${bin}"
            chmod +x "$dist_dir/${bin}"
          done
          tar -czf "dist/dtk-${{ matrix.target }}.tar.gz" -C "$dist_dir" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtk-${{ matrix.target }}
          path: dist/dtk-${{ matrix.target }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "$tag" ]; then
            echo "::error::Unable to determine release tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.txt
